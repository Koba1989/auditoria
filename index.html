              <label class="block">
                <div class="mb-1.5 text-[10px] font-bold uppercase tracking-[0.16em] text-slate-500">Motivo do descarte</div>
                <select id="reason" class="w-full rounded-xl border border-slate-200 bg-slate-50/50 px-4 py-3 text-sm text-slate-800 outline-none">${reasonOptions}</select>
              </label>
            </div>
          </div>
          <div class="space-y-5">
            <div class="flex flex-col gap-3 rounded-[26px] border border-slate-200 bg-[linear-gradient(135deg,rgba(255,255,255,0.96),rgba(240,253,250,0.88))] px-5 py-4 shadow-[0_12px_30px_rgba(15,23,42,0.05)] md:flex-row md:items-center md:justify-between">
              <div>
                <div class="text-[10px] font-bold uppercase tracking-[0.2em] text-slate-400">Resultados da auditoria</div>
                <h2 class="mt-1 text-lg font-bold tracking-tight text-slate-900">${rows.length} lead(s) na visualização atual</h2>
              </div>
              <div class="flex flex-wrap gap-2">
                <span class="inline-flex rounded-xl border border-teal-200 bg-teal-50 px-3 py-1.5 text-[10px] font-bold uppercase tracking-[0.16em] text-teal-700">${rows.filter(item => item.specialist.classification === "Descarte Correto").length} corretos</span>
                <span class="inline-flex rounded-xl border border-amber-200 bg-amber-50 px-3 py-1.5 text-[10px] font-bold uppercase tracking-[0.16em] text-amber-700">${rows.filter(item => item.specialist.classification === "Descarte Duvidoso").length} duvidosos</span>
                <span class="inline-flex rounded-xl border border-rose-200 bg-rose-50 px-3 py-1.5 text-[10px] font-bold uppercase tracking-[0.16em] text-rose-700">${rows.filter(item => item.specialist.classification === "Oportunidade Perdida").length} perdidos</span>
              </div>
            </div>

            ${actionHighlights.length ? `
              <div class="rounded-[24px] border border-amber-200 bg-[linear-gradient(135deg,#fffaf0,#fffbeb)] px-4 py-3 shadow-sm">
                <div class="flex flex-col gap-3 xl:flex-row xl:items-start xl:justify-between">
                  <div class="xl:max-w-[240px]">
                    <div class="text-[10px] font-bold uppercase tracking-[0.18em] text-amber-800">Acionamentos em destaque</div>
                    <div class="mt-1 text-sm font-semibold text-slate-900">Direcionamentos que mais aparecem na base atual</div>
                  </div>
                  <div class="grid flex-1 gap-2 lg:grid-cols-3">
                    ${actionHighlights.map(([action, count]) => `
                      <div class="rounded-2xl border border-amber-200/90 bg-white/90 px-3 py-2.5">
                        <div class="text-[10px] font-bold uppercase tracking-[0.16em] text-amber-700">${count} lead(s)</div>
                        <div class="mt-1 text-[12px] font-semibold leading-5 text-slate-900">${action.length > 110 ? `${action.slice(0, 109).trim()}...` : action}</div>
                      </div>
                    `).join("")}
                  </div>
                </div>
              </div>
            ` : ""}

            ${rows.length ? rows.map(renderAuditLeadCard).join("") : `
              <div class="panel rounded-[26px] p-10 text-center">
                <div class="text-[10px] font-bold uppercase tracking-[0.2em] text-slate-400">Sem resultados</div>
                <div class="mt-2 text-lg font-semibold text-slate-900">Nenhum lead corresponde aos filtros atuais.</div>
                <div class="mt-2 text-sm text-slate-500">Ajuste vendedor, status, motivo ou busca para ampliar a visualização.</div>
              </div>
            `}
          </div>
        </div>
      `;
    }

    function render() {
      const app = document.getElementById("app");
      app.innerHTML = state.rows.length ? (state.view === "dashboard" ? renderDashboard() : renderAudit()) : renderUpload();

      document.getElementById("nav-auditoria").className = `nav-btn w-full rounded-lg px-3 py-2 text-left ${state.view === "auditoria" ? "bg-brand-600/10 text-brand-400 border border-brand-500/20" : "hover:bg-slate-800"}`;
      document.getElementById("nav-dashboard").className = `nav-btn w-full rounded-lg px-3 py-2 text-left ${state.view === "dashboard" ? "bg-brand-600/10 text-brand-400 border border-brand-500/20" : "hover:bg-slate-800"}`;

      document.getElementById("nav-auditoria").onclick = () => { state.view = "auditoria"; render(); };
      document.getElementById("nav-dashboard").onclick = () => { state.view = "dashboard"; render(); };

      const upload = document.getElementById("fileUpload");
      if (upload) upload.onchange = async (e) => {
        state.fileName = e.target.files.length > 1 ? `${e.target.files.length} arquivos analisados` : e.target.files[0].name;
        state.rows = await readFiles(e.target.files);
        state.dashTitle = "";
        render();
      };
      const replaceUpload = document.getElementById("replaceUpload");
      if (replaceUpload) replaceUpload.onchange = async (e) => {
        state.fileName = e.target.files.length > 1 ? `${e.target.files.length} arquivos analisados` : e.target.files[0].name;
        state.rows = await readFiles(e.target.files);
        state.dashTitle = "";
        render();
      };

      const pdfBtn = document.getElementById("pdfBtn");
      if (pdfBtn) pdfBtn.onclick = () => {
        const exportRows = state.view === "dashboard"
          ? (state.dashSeller === "Todos" ? state.rows : state.rows.filter(item => item.seller === state.dashSeller))
          : filteredRows();
        exportPdf(exportRows);
      };

      const search = document.getElementById("search");
      if (search) search.oninput = (e) => { state.filters.search = e.target.value; render(); };
      const seller = document.getElementById("seller");
      if (seller) seller.onchange = (e) => { state.filters.seller = e.target.value; render(); };
      const status = document.getElementById("status");
      if (status) status.onchange = (e) => { state.filters.status = e.target.value; render(); };
      const reason = document.getElementById("reason");
      if (reason) reason.onchange = (e) => { state.filters.reason = e.target.value; render(); };
      const dashSeller = document.getElementById("dashSeller");
      if (dashSeller) dashSeller.onchange = (e) => { state.dashSeller = e.target.value; state.dashTitle = ""; render(); };
      document.querySelectorAll("[data-dash-title-key]").forEach((button) => {
        button.onclick = () => {
          const key = decodeURIComponent(button.dataset.dashTitleKey || "");
          state.dashTitle = state.dashTitle === key ? "" : key;
          render();
        };
      });
      const clearDashTitle = document.getElementById("clearDashTitle");
      if (clearDashTitle) clearDashTitle.onclick = () => { state.dashTitle = ""; render(); };
    }

    render();
  </script>
</body>
</html>
